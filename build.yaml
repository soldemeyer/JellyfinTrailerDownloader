category: "General"
overview: "Downloads YouTube movie trailers and stores them locally next to your movies."
description: >
  Scans your movie library and downloads trailers from YouTube using an embedded,
  auto-managed yt-dlp binary (or a remote YoutubeDL-Material server). Trailers are
  saved using Jellyfin's local trailer naming conventions so they attach to each
  movie automatically. Supports per-movie manual downloads, a manual full-library
  run, a weekly scheduled task, and configurable quality and file placement.
changelog: "Sidebar menu entry, schedule settings in plugin page, plugin banner image."
